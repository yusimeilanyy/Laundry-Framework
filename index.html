<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>LaundryGo - Admin Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #6f42c1);
            height: 100vh;
        }
        .login-card {
            border-radius: 15px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card login-card shadow-lg p-4" style="width: 380px;">
    
    <!-- Title -->
    <div class="text-center mb-4">
        <h3 class="fw-bold">LaundryGo</h3>
        <p class="text-muted">Admin Login</p>
    </div>

    <!-- Form -->
    <form id="loginForm">
        
        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" placeholder="admin@gmail.com" required>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </button>

    </form>

    <!-- Alert -->
    <div id="alertBox" class="alert alert-danger mt-3 d-none">
        Email atau password salah!
    </div>

</div>

<script>
    // Dummy login (frontend only)
    document.getElementById("loginForm").addEventListener("submit", function(e){
        e.preventDefault();

        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        // akun dummy
        if(email === "admin@gmail.com" && password === "12345"){
            alert("Login berhasil!");
            window.location.href = "admin-dashboard.html"; // redirect
        } else {
            document.getElementById("alertBox").classList.remove("d-none");
        }
    });
</script>

</body>
</html>
